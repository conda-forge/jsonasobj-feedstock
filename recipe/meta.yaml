{% set name = "jsonasobj" %}
{% set version = "2.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jsonasobj-{{ version }}.tar.gz
  sha256: e87c47ec5ec3db65a212e15236fdefc38dd01bdcf563b0d53021095066cd5963

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - jsonasobj
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/hsolbrig/jsonasobj
  summary: JSON as python objects
  license: CC0-1.0
  license_file: license.txt

extra:
  recipe-maintainers:
    - dstansby
